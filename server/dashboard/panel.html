<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שערי רווחה — פאנל מעקב</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14171c; --surface: #1c2127; --surface-2: #252b33;
    --border: #2d353f; --text: #e6ebf0; --text-dim: #8a97a5;
    --accent: #5b8def; --ok: #4caf82; --err: #e0685f; --warn: #d4a25a;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    direction: rtl; text-align: right; font-family: 'Heebo', sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .login-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 30px; width: 340px; text-align: center;
  }
  .login-card h1 { font-size: 21px; margin-bottom: 4px; }
  .login-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .login-card input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 9px; padding: 12px 14px; color: var(--text);
    font-family: inherit; font-size: 15px; text-align: right; margin-bottom: 16px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card button {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 9px; padding: 12px; font-family: inherit; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  .login-err { color: var(--err); font-size: 13px; margin-top: 10px; min-height: 16px; }

  .app { display: none; height: 100vh; flex-direction: column; }
  .app.active { display: flex; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header .title { display: flex; align-items: center; gap: 10px; }
  .header .title svg { width: 22px; height: 22px; color: var(--accent); }
  .header .title h1 { font-size: 17px; font-weight: 600; }
  .header .actions { display: flex; align-items: center; gap: 10px; }
  .refresh-btn, .logout-btn {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 8px; padding: 7px 13px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .refresh-btn:hover, .logout-btn:hover { color: var(--text); border-color: var(--accent); }
  .refresh-btn svg { width: 14px; height: 14px; }
  .auto-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }

  .main { flex: 1; display: flex; overflow: hidden; }
  .list { width: 320px; border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: var(--surface); }
  .session-row {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
  }
  .session-row:hover { background: var(--surface-2); }
  .session-row.selected { background: var(--surface-2); border-right: 3px solid var(--accent); }
  .session-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .session-phone { font-family: var(--mono); font-size: 13px; font-weight: 500; direction: ltr; }
  .session-time { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .session-steps { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .step-chip {
    font-family: var(--mono); font-size: 10px; padding: 2px 6px;
    border-radius: 4px; background: var(--bg); color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; }
  .chip-dot.ok { background: var(--ok); }
  .chip-dot.err { background: var(--err); }
  .chip-dot.read { background: var(--warn); }

  .detail { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .detail-empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 15px; }
  .detail-head { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .detail-head h2 { font-family: var(--mono); font-size: 16px; direction: ltr; text-align: right; margin-bottom: 6px; }
  .detail-head .meta { color: var(--text-dim); font-size: 13px; }

  .flow { display: flex; flex-direction: column; gap: 0; }
  .step {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-bottom: 4px;
  }
  .step-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; transition: background .12s;
  }
  .step-header:hover { background: var(--surface-2); }
  .step-name { font-family: var(--mono); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 9px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .step-dot.ok { background: var(--ok); }
  .step-dot.err { background: var(--err); }
  .step-dot.read { background: var(--warn); }
  .step-time { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .step-body { display: none; border-top: 1px solid var(--border); padding: 14px 16px; }
  .step-body.open { display: block; }
  .block { margin-bottom: 14px; }
  .block:last-child { margin-bottom: 0; }
  .block-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 7px; font-weight: 600; }
  .code {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-all; direction: ltr; text-align: left; color: #c8d4e0;
  }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; }
  .kv .k { color: var(--accent); font-family: var(--mono); font-size: 12.5px; direction: ltr; }
  .kv .v { font-family: var(--mono); font-size: 12.5px; direction: ltr; word-break: break-all; }
  .resp-ok { color: var(--ok); } .resp-read { color: var(--warn); } .resp-err { color: var(--err); }
  .arrow { color: var(--text-dim); text-align: center; font-size: 16px; padding: 2px 0; }
  .loading { padding: 40px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>פאנל מעקב</h1>
    <p>שערי רווחה — מפתח</p>
    <input type="password" id="pw" placeholder="סיסמת מפתח" autocomplete="current-password">
    <button id="loginBtn">כניסה</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <h1>פאנל מעקב IVR</h1>
    </div>
    <div class="actions">
      <button class="refresh-btn" id="autoBtn"><span class="auto-dot" id="autoDot"></span> רענון אוטומטי</button>
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        רענן
      </button>
      <button class="logout-btn" id="logoutBtn">יציאה</button>
    </div>
  </div>
  <div class="main">
    <div class="list" id="list"></div>
    <div class="detail" id="detail"><div class="detail-empty">בחר שיחה מהרשימה לצפייה בשלבים</div></div>
  </div>
</div>

<script>
  const STORE_KEY = 'sr_panel_token';
  let token = localStorage.getItem(STORE_KEY) || null;
  let sessions = [];
  let selectedKey = null;
  let autoRefresh = false, autoTimer = null;
  const $ = id => document.getElementById(id);

  async function doLogin() {
    const pw = $('pw').value.trim();
    if (!pw) return;
    $('loginErr').textContent = '';
    try {
      const r = await fetch('/panel/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
      if (!r.ok) { $('loginErr').textContent = 'סיסמה שגויה'; return; }
      const d = await r.json();
      token = d.token; localStorage.setItem(STORE_KEY, token); showApp();
    } catch { $('loginErr').textContent = 'שגיאת חיבור'; }
  }
  function logout() {
    localStorage.removeItem(STORE_KEY); token = null; stopAuto();
    $('app').classList.remove('active'); $('loginWrap').style.display = 'flex';
  }
  function showApp() { $('loginWrap').style.display = 'none'; $('app').classList.add('active'); loadSessions(); }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
  }
  function respType(resp) {
    if (!resp) return 'err';
    if (resp.startsWith('read=')) return 'read';
    if (resp.startsWith('id_list_message=')) return 'ok';
    return 'err';
  }
  function shortEndpoint(ep) { return ep.replace(/^\/ivr\//,''); }
  function sessionKey(s) { return s.call_id || ('single_' + s.steps[0].id); }

  async function loadSessions() {
    try {
      const r = await fetch('/panel/sessions?limit=200', { headers: {'x-auth': token} });
      if (r.status === 401) { logout(); return; }
      const d = await r.json();
      sessions = d.sessions;
      renderList();
      if (selectedKey) { const s = sessions.find(x => sessionKey(x) === selectedKey); if (s) renderDetail(s); }
    } catch { $('list').innerHTML = '<div class="loading">שגיאה בטעינה</div>'; }
  }

  function renderList() {
    const l = $('list');
    if (!sessions.length) { l.innerHTML = '<div class="loading">אין שיחות עדיין</div>'; return; }
    l.innerHTML = '';
    sessions.forEach(s => {
      const key = sessionKey(s);
      const row = document.createElement('div');
      row.className = 'session-row' + (key === selectedKey ? ' selected' : '');
      const chips = s.steps.map(st => `<span class="step-chip"><span class="chip-dot ${respType(st.response)}"></span>${shortEndpoint(st.endpoint)}</span>`).join('');
      row.innerHTML = `
        <div class="session-top">
          <span class="session-phone">${s.phone || '—'}</span>
          <span class="session-time">${fmtTime(s.last_at)}</span>
        </div>
        <div class="session-steps">${chips}</div>
      `;
      row.addEventListener('click', () => { selectedKey = key; renderList(); renderDetail(s); });
      l.appendChild(row);
    });
  }

  function renderDetail(s) {
    const steps = s.steps.map((st, i) => {
      const t = respType(st.response);
      const q = st.query || {};
      const kv = Object.keys(q).length
        ? Object.entries(q).map(([k,v]) => `<span class="k">${k}</span><span class="v">${v}</span>`).join('')
        : '<span class="v" style="color:var(--text-dim)">אין פרמטרים</span>';
      const arrow = i < s.steps.length - 1 ? '<div class="arrow">↓</div>' : '';
      return `
        <div class="step">
          <div class="step-header" onclick="this.nextElementSibling.classList.toggle('open')">
            <span class="step-name"><span class="step-dot ${t}"></span>${shortEndpoint(st.endpoint)}</span>
            <span class="step-time">${fmtTime(st.created_at)}</span>
          </div>
          <div class="step-body ${i === s.steps.length-1 ? 'open' : ''}">
            <div class="block">
              <div class="block-label">בקשה (Query)</div>
              <div class="code"><div class="kv">${kv}</div></div>
            </div>
            <div class="block">
              <div class="block-label">תגובה (Response)</div>
              ${explainResponse(st.response) ? `<div style="color:var(--accent);font-size:13px;margin-bottom:8px;font-weight:600;">↳ ${explainResponse(st.response)}</div>` : ''}
              <div class="code resp-${t}">${st.response || '(ריק)'}</div>
            </div>
          </div>
        </div>${arrow}`;
    }).join('');

    $('detail').innerHTML = `
      <div class="detail-head">
        <h2>${s.phone || 'שיחה ללא טלפון'}</h2>
        <div class="meta">${s.steps.length} שלבים · ${fmtTime(s.first_at)} ${s.call_id ? '· ' + s.call_id.slice(0,12) : ''}</div>
      </div>
      <div class="flow">${steps}</div>
    `;
  }

  function explainResponse(resp) {
    if (!resp) return 'אין תגובה';
    if (resp.includes('32/000')) return 'נסיעה מלאה';
    if (resp.includes('32/001')) return 'נשאר מקום 1 — בקשת כמות מחדש';
    if (resp.includes('32/002')) return 'נשאר מקום 2 — בקשת כמות מחדש';
    if (resp.includes('32/003')) return 'בקשת כמות מקומות';
    if (resp.includes('32/004')) return 'שלום ולהתראות';
    if (resp.includes('32/005')) return 'הזמנה נקלטה בהצלחה + קוד אישור';
    if (resp.includes('32/006')) return 'שגיאה — שוב פעם';
    if (resp.includes('32/007')) return 'ההזמנה נסגרה לשעה זו';
    if (resp.includes('32/008')) return 'מחוץ לחלון הזמן';
    if (resp.includes('32/009')) return 'נמצאה נסיעה בשעה';
    if (resp.includes('32/010')) return 'כמות המקומות שהוזמנו';
    if (resp.includes('32/011')) return 'לא נמצאה הזמנה';
    if (resp.includes('32/012')) return 'אישור ביטול — למחיקה 1, לביטול 2';
    if (resp.includes('32/013')) return 'הזמנה נמחקה בהצלחה';
    if (resp.includes('32/014')) return 'שואל תחנה — גבעה A';
    if (resp.includes('32/015')) return 'שואל תחנה — גבעה B';
    if (resp.includes('32/016')) return 'שואל גבעה';
    if (resp.includes('NEIGHBORHOOD')) return 'שואל גבעה';
    if (resp.includes('ASTATION')) return 'שואל תחנה — גבעה A';
    if (resp.includes('BSTATION')) return 'שואל תחנה — גבעה B';
    if (resp.includes('SEATS')) return 'שואל כמות מקומות מחדש';
    if (resp.includes('CANCEL_CODE')) return 'שואל קוד ביטול';
    if (resp.includes('CONFIRM')) return 'שואל אישור ביטול';
    if (resp.startsWith('read=')) return 'שואל קלט מהמתקשר';
    if (resp.startsWith('id_list_message=')) return 'מנגן הודעה';
    return '';
  }

  function toggleAuto() {
    autoRefresh = !autoRefresh;
    $('autoDot').style.background = autoRefresh ? 'var(--ok)' : 'var(--text-dim)';
    if (autoRefresh) autoTimer = setInterval(loadSessions, 3000); else stopAuto();
  }
  function stopAuto() {
    autoRefresh = false; $('autoDot').style.background = 'var(--text-dim)';
    if (autoTimer) clearInterval(autoTimer);
  }

  $('loginBtn').addEventListener('click', doLogin);
  $('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  $('logoutBtn').addEventListener('click', logout);
  $('refreshBtn').addEventListener('click', loadSessions);
  $('autoBtn').addEventListener('click', toggleAuto);
  stopAuto();
  if (token) showApp();
</script>
</body>
</html>
