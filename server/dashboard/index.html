<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שערי רווחה — ממשק נהג</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1a2b3c;
    --ink-soft: #5e7186;
    --ink-faint: #9aabbb;
    --line: #e4eaef;
    --line-soft: #eef2f5;
    --beitar: #1f8a6d;
    --beitar-bg: #e6f5f0;
    --beitar-bg2: #d3ede4;
    --hadassah: #d98324;
    --hadassah-bg: #fdf1e3;
    --hadassah-bg2: #f9e3c9;
    --accent: #1f8a6d;
    --danger: #d65745;
    --shadow: 0 1px 3px rgba(26,43,60,.06), 0 8px 24px rgba(26,43,60,.05);
    --shadow-lg: 0 4px 12px rgba(26,43,60,.08), 0 16px 48px rgba(26,43,60,.08);
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    direction: rtl; text-align: right;
    font-family: 'Heebo', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  /* ===== Login ===== */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    background: var(--card); border-radius: 24px; padding: 44px 36px;
    width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
  }
  .login-logo {
    width: 72px; height: 72px; margin: 0 auto 22px; border-radius: 20px;
    background: linear-gradient(135deg, var(--beitar), #2aa885);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(31,138,109,.25);
  }
  .login-logo svg { width: 38px; height: 38px; color: #fff; }
  .login-card h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
  .login-card .sub { color: var(--ink-soft); font-size: 15px; margin-bottom: 30px; font-weight: 500; }
  .field { margin-bottom: 18px; }
  .field input {
    width: 100%; background: var(--bg); border: 2px solid var(--line);
    border-radius: 14px; padding: 15px 18px; color: var(--ink);
    font-family: inherit; font-size: 16px; text-align: right; transition: all .18s; font-weight: 500;
  }
  .field input:focus { outline: none; border-color: var(--beitar); background: #fff; }
  .remember {
    display: flex; align-items: center; gap: 10px; margin-bottom: 26px;
    cursor: pointer; color: var(--ink-soft); font-size: 15px; font-weight: 500; user-select: none;
  }
  .remember input { width: 20px; height: 20px; accent-color: var(--beitar); cursor: pointer; }
  .btn-primary {
    width: 100%; background: var(--beitar); color: #fff; border: none;
    border-radius: 14px; padding: 16px; font-family: inherit; font-size: 17px;
    font-weight: 700; cursor: pointer; transition: all .18s;
    box-shadow: 0 4px 14px rgba(31,138,109,.28);
  }
  .btn-primary:hover { background: #1a7a60; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(31,138,109,.34); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .6; cursor: default; transform: none; }
  .login-error { color: var(--danger); font-size: 14px; margin-top: 16px; min-height: 18px; font-weight: 600; }

  /* ===== App ===== */
  .app { display: none; max-width: 800px; margin: 0 auto; padding: 0 16px 80px; }
  .app.active { display: block; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 4px 18px; position: sticky; top: 0; background: var(--bg);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--beitar), #2aa885);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(31,138,109,.22);
  }
  .brand-mark svg { width: 23px; height: 23px; color: #fff; }
  .brand h1 { font-size: 20px; font-weight: 800; letter-spacing: -.4px; }
  .brand .tag { font-size: 12.5px; color: var(--ink-faint); font-weight: 600; margin-top: -2px; }
  .logout {
    background: var(--card); border: 1.5px solid var(--line); color: var(--ink-soft);
    border-radius: 11px; padding: 9px 16px; font-family: inherit; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 7px;
  }
  .logout:hover { border-color: var(--danger); color: var(--danger); }
  .logout svg { width: 15px; height: 15px; }

  .datebar {
    display: flex; align-items: center; gap: 10px; margin: 4px 4px 22px;
    color: var(--ink-soft); font-size: 15.5px; font-weight: 600;
  }
  .datebar svg { width: 18px; height: 18px; color: var(--beitar); }
  .datebar strong { color: var(--ink); font-weight: 700; }

  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 26px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 16px 18px; box-shadow: var(--shadow);
  }
  .stat .num { font-size: 28px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 13px; color: var(--ink-soft); font-weight: 600; margin-top: 2px; }
  .stat.green .num { color: var(--beitar); }
  .stat.orange .num { color: var(--hadassah); }

  .group-label {
    display: flex; align-items: center; gap: 9px; margin: 26px 4px 13px;
    font-size: 13px; font-weight: 700; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: .6px;
  }
  .group-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .ride {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 13px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow .18s;
  }
  .ride:hover { box-shadow: var(--shadow-lg); }
  .ride-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; cursor: pointer; gap: 14px;
  }
  .ride-main { display: flex; align-items: center; gap: 16px; min-width: 0; }
  .ride-time {
    font-size: 27px; font-weight: 800; letter-spacing: -1px;
    font-variant-numeric: tabular-nums; line-height: 1; flex-shrink: 0;
  }
  .ride-meta { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .dir-pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
    padding: 4px 11px; border-radius: 8px; width: fit-content;
  }
  .dir-pill svg { width: 13px; height: 13px; }
  .dir-pill.beitar { background: var(--beitar-bg); color: var(--beitar); }
  .dir-pill.hadassah { background: var(--hadassah-bg); color: var(--hadassah); }

  .ride-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .occupancy { text-align: left; }
  .occupancy .seats {
    font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1;
  }
  .occupancy .seats .sep { color: var(--ink-faint); font-weight: 600; }
  .occupancy .seats.empty { color: var(--ink-faint); }
  .occupancy .seats.full { color: var(--danger); }
  .occupancy .seats.partial { color: var(--beitar); }
  .occupancy .occ-lbl { font-size: 11.5px; color: var(--ink-faint); font-weight: 600; margin-top: 3px; }

  .chevron {
    width: 30px; height: 30px; border-radius: 9px; background: var(--bg);
    display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0;
  }
  .chevron svg { width: 17px; height: 17px; color: var(--ink-soft); transition: transform .25s; }
  .ride.open .chevron { background: var(--beitar-bg); }
  .ride.open .chevron svg { transform: rotate(180deg); color: var(--beitar); }

  .occbar { height: 4px; background: var(--line-soft); position: relative; overflow: hidden; }
  .occbar-fill { height: 100%; transition: width .4s ease; border-radius: 0 2px 2px 0; }
  .occbar-fill.beitar { background: var(--beitar); }
  .occbar-fill.hadassah { background: var(--hadassah); }

  .pax-wrap { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .ride.open .pax-wrap { max-height: 1200px; }
  .pax-list { border-top: 1px solid var(--line-soft); }
  .pax {
    display: flex; align-items: center; gap: 14px; padding: 14px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .pax:last-child { border-bottom: none; }
  .pax-num {
    width: 26px; height: 26px; border-radius: 8px; background: var(--bg);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 12.5px; font-weight: 700; color: var(--ink-soft); font-variant-numeric: tabular-nums;
  }
  .pax-station { flex: 1; font-size: 14.5px; font-weight: 600; min-width: 0; }
  .pax-info { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pax-phone { font-size: 13.5px; color: var(--ink-soft); direction: ltr; font-variant-numeric: tabular-nums; font-weight: 500; }
  .pax-seats {
    background: var(--beitar-bg); color: var(--beitar); font-weight: 700;
    font-size: 13px; padding: 3px 9px; border-radius: 7px; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .pax-code {
    background: var(--bg); color: var(--ink-faint); font-size: 12.5px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px; font-variant-numeric: tabular-nums; letter-spacing: .5px;
  }
  .pax-empty { padding: 22px 20px; text-align: center; color: var(--ink-faint); font-size: 14px; font-weight: 500; }

  .state {
    text-align: center; padding: 60px 20px; color: var(--ink-soft);
  }
  .state svg { width: 44px; height: 44px; color: var(--ink-faint); margin-bottom: 14px; }
  .state .title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
  .state .desc { font-size: 14.5px; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--beitar);
    border-radius: 50%; margin: 0 auto 16px; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 560px) {
    .summary { gap: 8px; }
    .stat { padding: 13px 14px; }
    .stat .num { font-size: 23px; }
    .stat .lbl { font-size: 11.5px; }
    .ride-time { font-size: 23px; }
    .ride-head { padding: 15px 16px; gap: 10px; }
    .ride-main { gap: 12px; }
    .pax { padding: 13px 16px; gap: 10px; }
    .pax-info { gap: 6px; }
    .pax-phone { font-size: 12.5px; }
    .brand h1 { font-size: 18px; }
  }
  @media (max-width: 400px) {
    .occ-lbl { display: none; }
    .pax-station { font-size: 13.5px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/>
        <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.6 6.8 19.9 6 19 6H5c-.9 0-1.6.8-1.8 1.6l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C2.5 16.3 3 18 3 18h3"/>
        <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
      </svg>
    </div>
    <h1>שערי רווחה</h1>
    <div class="sub">ממשק נהג</div>
    <div class="field">
      <input type="password" id="pw" placeholder="סיסמה" autocomplete="current-password">
    </div>
    <label class="remember">
      <input type="checkbox" id="remember" checked>
      <span>זכור אותי</span>
    </label>
    <button class="btn-primary" id="loginBtn">כניסה</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/>
          <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.6 6.8 19.9 6 19 6H5c-.9 0-1.6.8-1.8 1.6l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C2.5 16.3 3 18 3 18h3"/>
          <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
        </svg>
      </div>
      <div>
        <h1>שערי רווחה</h1>
        <div class="tag">ממשק נהג</div>
      </div>
    </div>
    <button class="logout" id="logoutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      יציאה
    </button>
  </div>

  <div class="datebar" id="datebar"></div>
  <div class="summary" id="summary"></div>
  <div id="ridesContainer"></div>
</div>

<script>
  const STORE_KEY = 'sr_driver_token';
  let token = sessionStorage.getItem(STORE_KEY) || localStorage.getItem(STORE_KEY) || null;
  const $ = id => document.getElementById(id);

  async function doLogin() {
    const pw = $('pw').value.trim();
    const remember = $('remember').checked;
    if (!pw) return;
    $('loginBtn').disabled = true;
    $('loginErr').textContent = '';
    try {
      const r = await fetch('/admin/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw })
      });
      if (!r.ok) { $('loginErr').textContent = 'סיסמה שגויה'; $('loginBtn').disabled = false; return; }
      const data = await r.json();
      token = data.token;
      if (remember) localStorage.setItem(STORE_KEY, token);
      else sessionStorage.setItem(STORE_KEY, token);
      showApp();
    } catch {
      $('loginErr').textContent = 'שגיאת חיבור, נסו שוב';
      $('loginBtn').disabled = false;
    }
  }

  function logout() {
    localStorage.removeItem(STORE_KEY); sessionStorage.removeItem(STORE_KEY); token = null;
    $('app').classList.remove('active'); $('loginWrap').style.display = 'flex';
    $('pw').value = ''; $('loginBtn').disabled = false;
  }

  async function showApp() {
    $('loginWrap').style.display = 'none';
    $('app').classList.add('active');
    await loadRides();
  }

  function fmtDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  function dirClass(dir) { return dir === 'beitar_hadassah' ? 'beitar' : 'hadassah'; }
  function dirLabel(dir) { return dir === 'beitar_hadassah' ? 'ביתר ← הדסה' : 'הדסה ← ביתר'; }
  function dirArrow() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
  }

  async function loadRides() {
    const c = $('ridesContainer');
    c.innerHTML = '<div class="state"><div class="spinner"></div><div class="desc">טוען נסיעות…</div></div>';
    $('summary').innerHTML = ''; $('datebar').innerHTML = '';
    try {
      const r = await fetch('/admin/driver', { headers: { 'x-auth': token } });
      if (r.status === 401) { logout(); return; }
      if (!r.ok) throw new Error();
      const data = await r.json();
      renderAll(data);
    } catch {
      c.innerHTML = '<div class="state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div class="title">לא ניתן לטעון</div><div class="desc">רעננו את העמוד</div></div>';
    }
  }

  function renderAll(data) {
    $('datebar').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> נסיעות ל<strong>' + fmtDate(data.date) + '</strong>';

    const totalSeats = data.rides.reduce((s, r) => s + r.seats_taken, 0);
    const totalBookings = data.rides.reduce((s, r) => s + r.passengers.length, 0);
    const activeRides = data.rides.filter(r => r.seats_taken > 0).length;
    $('summary').innerHTML = `
      <div class="stat green"><div class="num">${totalSeats}</div><div class="lbl">מקומות תפוסים</div></div>
      <div class="stat"><div class="num">${totalBookings}</div><div class="lbl">הזמנות</div></div>
      <div class="stat orange"><div class="num">${activeRides}</div><div class="lbl">נסיעות פעילות</div></div>
    `;

    const beitar = data.rides.filter(r => r.direction === 'beitar_hadassah');
    const hadassah = data.rides.filter(r => r.direction === 'hadassah_beitar');
    const c = $('ridesContainer');
    c.innerHTML = '';
    c.appendChild(groupLabel('ביתר ← הדסה'));
    beitar.forEach(r => c.appendChild(rideEl(r)));
    c.appendChild(groupLabel('הדסה ← ביתר'));
    hadassah.forEach(r => c.appendChild(rideEl(r)));
  }

  function groupLabel(text) {
    const d = document.createElement('div');
    d.className = 'group-label';
    d.textContent = text;
    return d;
  }

  function rideEl(ride) {
    const dc = dirClass(ride.direction);
    const taken = ride.seats_taken;
    const pct = Math.round((taken / 16) * 100);
    let seatsClass = 'empty';
    if (taken >= 16) seatsClass = 'full';
    else if (taken > 0) seatsClass = 'partial';

    const div = document.createElement('div');
    div.className = 'ride';

    const paxRows = ride.passengers.length
      ? ride.passengers.map((p, i) => `
          <div class="pax">
            <span class="pax-num">${i + 1}</span>
            <span class="pax-station">${p.station_name}</span>
            <span class="pax-info">
              <span class="pax-seats">${p.seats_count} מק'</span>
              <span class="pax-phone">${p.phone}</span>
              <span class="pax-code">${p.booking_code}</span>
            </span>
          </div>`).join('')
      : '<div class="pax-empty">אין הזמנות לנסיעה זו</div>';

    div.innerHTML = `
      <div class="ride-head">
        <div class="ride-main">
          <span class="ride-time">${ride.departure_time}</span>
          <div class="ride-meta">
            <span class="dir-pill ${dc}">${dirArrow()} ${dirLabel(ride.direction)}</span>
          </div>
        </div>
        <div class="ride-right">
          <div class="occupancy">
            <div class="seats ${seatsClass}">${taken}<span class="sep"> / 16</span></div>
            <div class="occ-lbl">מקומות</div>
          </div>
          <div class="chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      <div class="occbar"><div class="occbar-fill ${dc}" style="width:${pct}%"></div></div>
      <div class="pax-wrap"><div class="pax-list">${paxRows}</div></div>
    `;

    div.querySelector('.ride-head').addEventListener('click', () => div.classList.toggle('open'));
    return div;
  }

  $('loginBtn').addEventListener('click', doLogin);
  $('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  $('logoutBtn').addEventListener('click', logout);

  if (token) showApp();
</script>
</body>
</html>
